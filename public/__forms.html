<!doctype html>
<!--
  Static skeleton for Netlify's build-time form detection only. This file is
  never shown to visitors — the live form is rendered by the React
  NewsletterSignup component, which submits here via AJAX. Keep the field
  names in sync with that component.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <title>Forms</title>
  </head>
  <body>
    <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="newsletter" />
      <input type="email" name="email" />
      <input name="bot-field" />
    </form>
  </body>
</html>
