[build]
  command = "vite build"
  publish = "dist/client"
[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # HTML pages: the browser always revalidates, but the CDN may serve a
    # stale page for up to a day while it refreshes in the background.
    # Netlify-CDN-Cache-Control is stripped before reaching the browser.
    Netlify-CDN-Cache-Control = "public, max-age=0, stale-while-revalidate=86400"

# Hashed build assets (JS/CSS) never change for a given URL — cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

# Static media and fonts in public/ — long-lived browser + CDN cache.
[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Netlify-CDN-Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Netlify-CDN-Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Netlify-CDN-Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

# Dynamic view-counter API must never be cached, or counts would freeze.
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/posts"
  to = "/"
  status = 301

# Canonical host: force the non-www apex domain so search engines index a
# single authoritative origin.
[[redirects]]
  from = "https://www.publicsafetyfactshawaii.org/*"
  to = "https://publicsafetyfactshawaii.org/:splat"
  status = 301
  force = true
